spring:
  application:
    name: phcep-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/phcep
    username: phcep
    password: changeme
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  data:
    redis:
      host: localhost
      port: 6379

  security:
    jwt:
      secret: replace-with-256-bit-base64-secret
      expiration-ms: 86400000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

phcep:
  ml:
    base-url: http://localhost:8081
    timeout-seconds: 30
  intake-worker:
    base-url: http://localhost:8082  # Workflow A embedding worker (defaults to ml.base-url if absent)
  line:
    channel-access-token: YOUR_LINE_CHANNEL_ACCESS_TOKEN
    channel-secret: YOUR_LINE_CHANNEL_SECRET
    hcp-user-id: ""   # LINE user ID or group ID for HCP notifications (leave blank to disable)
  deidentification:
    date-shift-seed: replace-with-secret-seed
  payment:
    enabled: false
    ton:
      wallet-address: ""
  # ── Workflow A: Gemini classification ──────────────────────────────────────
  gemini:
    api-key: ""          # Set via PHCEP_GEMINI_API_KEY env var or replace here
    model: gemini-1.5-flash
  # ── Workflow A: Google Sheets sync (optional) ──────────────────────────────
  google-sheets:
    spreadsheet-id: ""   # Google Sheets spreadsheet ID (leave blank to disable)
    range: "Sheet1!A1:Z" # Sheet range to read
    credentials-path: "" # Path to service-account JSON key file
    user-token: "GSHEETS_IMPORT"  # Pseudonymous token for imported rows

logging:
  level:
    com.phcep: DEBUG
    ca.uhn.fhir: WARN
