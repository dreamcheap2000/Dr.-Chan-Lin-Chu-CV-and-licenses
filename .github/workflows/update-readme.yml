name: Update README (auto-generated expertise summary)

on:
  push:
    branches: [ "main" ]
    paths:
      - "CV and certificate/01_*/*"
      - "CV and certificate/02_*/*"
      - "CV and certificate/03_*/*"
      - "CV and certificate/04_*/*"
      - "CV and certificate/05_*/*"
      - "CV and certificate/06_*/*"
      - "CV and certificate/07_*/*"
      - "CV and certificate/08_*/*"
      - "CV and certificate/09_*/*"
      - "CV and certificate/10_Work_Experience/**"
      - "CV and certificate/publications/**"
      - "CV and certificate/projects/**"
      - "CV and certificate/scripts/**"
      - ".github/translations.yml"
      - "README.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Prevent infinite loops: skip runs triggered by this bot's own commits.
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r "CV and certificate/scripts/requirements.txt"

      - name: Normalize new files (move 02_* uploads → 03_* with NN_ prefix)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python "CV and certificate/scripts/normalize_new_files.py"

      - name: Fetch PubMed links
        run: |
          python "CV and certificate/scripts/fetch_pubmed_links.py"

      - name: Fetch project files (Colab notebook & Google Doc)
        run: |
          python "CV and certificate/scripts/fetch_project_files.py"

      - name: Generate README section
        run: |
          python "CV and certificate/scripts/generate_readme_section.py"

      - name: Commit changes (if any)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage all certificate folder changes (covers moves/renames from normalize step)
          git add "CV and certificate/"
          git add README.md .github/translations.yml \
            "CV and certificate/publications/publications.yml"
          # Add project files only if they were successfully downloaded
          for f in "CV and certificate/projects/phd_colab_notebook.ipynb" \
                   "CV and certificate/projects/mathematical_framework.html"; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-update README, publication links, and project files"
          git push
