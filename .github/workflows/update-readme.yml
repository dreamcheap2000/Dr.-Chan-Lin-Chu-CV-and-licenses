name: Update README (auto-generated expertise summary)

on:
  push:
    branches: [ "main" ]
    paths:
      - "01_*/*"
      - "02_*/*"
      - "03_*/*"
      - "04_*/*"
      - "05_*/*"
      - "06_*/*"
      - "07_*/*"
      - "08_*/*"
      - "09_*/*"
      - "scripts/**"
      - ".github/translations.yml"
      - "README.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r scripts/requirements.txt

      - name: Generate README section
        run: |
          python scripts/generate_readme_section.py

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .github/translations.yml
          git commit -m "chore: auto-update README expertise summary"
          git push
