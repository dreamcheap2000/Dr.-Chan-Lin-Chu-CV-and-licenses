- title: "AI-Assisted Post-Stroke Functional Outcome Prediction"
  description: >
    Compared and interpreted multiple machine-learning models to predict 30-day and 90-day
    functional outcomes (Barthel Index) in stroke patients undergoing post-acute care rehabilitation.
    Features included demographics, stroke severity (NIHSS), and comorbidities.
  url: "https://doi.org/10.3390/diagnostics11101784"
  tags:
    - Machine Learning
    - Stroke Rehabilitation
    - Post-Acute Care
    - Interpretable AI
  status: "Published"
  note: "Chang SC*, Chu CL* et al. Diagnostics 2021 — co-first author"

